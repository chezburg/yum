services:
  yum:
    build:
      context: .
      args:
        # Set to "true" to bake local models (faster-whisper, PaddleOCR) into the image
        INSTALL_LOCAL_MODELS: "false"
    container_name: yum
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      # Persistent database (holds config, secrets encrypted with SECRET_KEY,
      # and all extracted recipes) - back this up!
      - /docker/yum/data:/data
      # Markdown export target - point this at your Obsidian vault if desired
      - /docker/yum/export:/export

  # --- Optional: local LLM via Ollama ---
  # Uncomment to run reconstruction/vision fully locally.
  # Then in the web UI Settings set:
  #   LLM model:    ollama/llama3.1
  #   API base URL: http://ollama:11434
