services:
  yum:
    build:
      context: .
      args:
        # Set to "true" to bake local OCR models (PaddleOCR) into the image
        INSTALL_LOCAL_MODELS: "false"
    container_name: yum
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      # Persistent database (holds config, secrets encrypted with SECRET_KEY,
      # and all extracted recipes) - back this up!
      # Override the host path via DATA_PATH in .env, e.g. /docker/yum/data
      - ${DATA_PATH:-./data}:/data
      # Markdown export target - point this at your Obsidian vault if desired
      # Override the host path via EXPORT_PATH in .env, e.g. /docker/yum/export
      - ${EXPORT_PATH:-./export}:/export

  # --- Optional: local LLM / Vision via Ollama ---
  # Uncomment to run reconstruction/vision fully locally.
  # Then in the web UI Settings set (LLM and/or Vision engine):
  #   Engine:       local
  #   Model:        ollama/llama3.1   (LLM)  /  ollama/qwen2.5vl  (Vision)
  #   API base URL: http://ollama:11434
  #
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: ollama
  #   restart: unless-stopped
  #   volumes:
  #     - ollama-models:/root/.ollama
  #   # For NVIDIA GPU acceleration:
  #   # deploy:
  #   #   resources:
  #   #     reservations:
  #   #       devices:
  #   #         - driver: nvidia
  #   #           count: all
  #   #           capabilities: [gpu]

  # --- Optional: local Speech-to-Text via an OpenAI-compatible Whisper server ---
  # Uncomment to run transcription locally. Then in the web UI Settings set
  # (Speech-to-Text engine):
  #   Engine:       local
  #   API base URL: http://whisper:8000/v1
  #   API key:      (leave blank)
  #   Model:        Systran/faster-whisper-small  (or your server's model id)
  #
  # whisper:
  #   image: ghcr.io/speaches-ai/speaches:latest
  #   container_name: whisper
  #   restart: unless-stopped
  #   volumes:
  #     - whisper-models:/root/.cache/huggingface

