services:
  recipe-extractor:
    build:
      context: .
      args:
        # Set to "true" to bake local models (faster-whisper, PaddleOCR) into the image
        INSTALL_LOCAL_MODELS: "false"
    container_name: ig-recipe-extractor
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      # Persistent database & downloaded media
      - ./data:/data
      # Instagram cookies / session files (read-only)
      - ./config:/config:ro
      # Markdown/Obsidian export target - point this at your vault if desired
      - ./export:/export

  # --- Optional: local LLM via Ollama ---
