<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}yum{% endblock %} · yum</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <style>
    [x-cloak] { display: none; }
  </style>
</head>
<body class="h-full bg-stone-100 text-stone-800 antialiased">
  <div class="min-h-full">
    <nav class="bg-orange-600 shadow">
      <div class="mx-auto max-w-6xl px-4 py-3 flex items-center gap-6">
        <a href="/" class="text-white font-bold text-xl tracking-tight">🍜 yum</a>
        {% set links = [("dashboard", "/", "Dashboard"), ("recipes", "/recipes", "Recipes"), ("jobs", "/jobs", "Jobs"), ("settings", "/settings", "Settings")] %}
        {% for key, href, label in links %}
        <a href="{{ href }}"
           class="text-sm font-medium {% if active == key %}text-white border-b-2 border-white pb-0.5{% else %}text-orange-100 hover:text-white{% endif %}">
          {{ label }}
        </a>
        {% endfor %}
      </div>
    </nav>
    <main class="mx-auto max-w-6xl px-4 py-8">
      {% block content %}{% endblock %}
    </main>
    <footer class="mx-auto max-w-6xl px-4 pb-8 text-xs text-stone-400">
      yum · self-hosted Instagram recipe extractor
    </footer>
  </div>
</body>
</html>
