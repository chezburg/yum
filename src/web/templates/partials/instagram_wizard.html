{% if result.state.value == "complete" %}
<div class="rounded-lg bg-green-50 border border-green-200 p-3 text-sm text-green-700">
  ✓ {{ result.message }}
  <script>setTimeout(() => window.location.reload(), 800);</script>
</div>
{% elif result.state.value == "two_factor_required" %}
<div class="rounded-lg bg-blue-50 border border-blue-200 p-4">
  <p class="text-sm text-blue-800 mb-3">{{ result.message }}</p>
  <form hx-post="/settings/instagram/2fa" hx-target="#instagram-wizard" hx-swap="innerHTML" class="flex gap-3">
    <input type="hidden" name="wizard_token" value="{{ result.wizard_token }}">
    <input type="text" name="code" required placeholder="123456" inputmode="numeric"
           autocomplete="one-time-code" maxlength="16"
           class="w-40 rounded-lg border border-stone-300 px-3 py-2 text-sm">
    <button type="submit"
            class="rounded-lg bg-orange-600 px-4 py-2 text-sm font-semibold text-white hover:bg-orange-700">
      Verify
    </button>
  </form>
</div>
{% else %}
<div class="rounded-lg bg-red-50 border border-red-200 p-3 text-sm text-red-700">
  ✗ {{ result.message }}
</div>
{% endif %}
